<div class="login-container">
  <mat-card class="login-card">

    <div class="login-header">
      <img src="https://i.postimg.cc/sXKjbG05/logotipo-(1).png" alt="Logo Tienda" class="login-logo">
      <h1>Bienvenido</h1>
      <p>Inicia Sesión</p>
    </div>

    <mat-card-content>
      <div *ngIf="erroMessage" class="error-box">
        {{ erroMessage }}
      </div>

      <form [formGroup]="formLogin" (ngSubmit)="onAuthentication()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput formControlName="vUsuario" placeholder="ejemplo@tienda.com">
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="vPassword">
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <button mat-flat-button color="primary" class="btn-login" type="submit">
          Ingresar al Sistema
        </button>

      </form>
    </mat-card-content>

  </mat-card>
</div>
