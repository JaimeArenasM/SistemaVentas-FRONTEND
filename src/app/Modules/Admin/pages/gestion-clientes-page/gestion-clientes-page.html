<div class="content-wrapper">
  <div class="table-header">
    <div>
      <h2>User Management</h2>
      <p>Lista de clientes registrados en la plataforma</p>
    </div>

    <div class="header-actions">

      <div class="search-box">
        <mat-icon>search</mat-icon>
        <input type="text" (keyup)="aplicarFiltro($event)" placeholder="Buscar DNI, nombre, correo...">
      </div>

      <button class="btn-primary-crm" (click)="abrirModalUsuario()">
        <mat-icon>add</mat-icon> Añadir Usuario
      </button>

    </div>
  </div>

  <mat-card class="crm-table-card">
    <table mat-table [dataSource]="dataSource" class="crm-table">

      <ng-container matColumnDef="usuario">
        <th mat-header-cell *matHeaderCellDef> USUARIO </th>
        <td mat-cell *matCellDef="let c">
          <div class="user-cell">
            <span class="user-email">{{ c.vUsuario }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="dni">
        <th mat-header-cell *matHeaderCellDef> DNI </th>
        <td mat-cell *matCellDef="let c"> {{ c.dni || '---' }} </td>
      </ng-container>

      <ng-container matColumnDef="nombres">
        <th mat-header-cell *matHeaderCellDef> NOMBRES </th>
        <td mat-cell *matCellDef="let c"> {{ c.nombres }} </td>
      </ng-container>

      <ng-container matColumnDef="apellidos">
        <th mat-header-cell *matHeaderCellDef> APELLIDOS </th>
        <td mat-cell *matCellDef="let c"> {{ c.apellidos }} </td>
      </ng-container>

      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef> TELÉFONO </th>
        <td mat-cell *matCellDef="let c"> {{ c.telefono || '---' }} </td>
      </ng-container>

      <ng-container matColumnDef="rol">
        <th mat-header-cell *matHeaderCellDef> TIPO </th>
        <td mat-cell *matCellDef="let c">
          <span class="badge-status cliente">Cliente</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> ACCIONES </th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button class="action-btn edit" (click)="abrirModalUsuario(c)" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button class="action-btn delete" (click)="eliminar(c)" title="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div *ngIf="dataSource.data.length === 0" class="no-data-msg" style="text-align: center; padding: 30px; color: #a1a5b7;">
      No hay clientes registrados en el sistema.
    </div>
  </mat-card>
</div>
