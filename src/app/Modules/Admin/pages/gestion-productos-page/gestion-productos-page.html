<h2>Gestión de Productos</h2>
<button (click)="openNewProductForm()">Añadir Producto</button>

<table>
  <thead>
    <tr>
      <th>ID</th><th>Nombre</th><th>Precio</th><th>Imagen</th><th>Descripción</th><th>Categoría</th><th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let product of products">
      <td>{{ product.id }}</td>
      <td>{{ product.name }}</td>
      <td>{{ product.price }}</td>
      <td><img [src]="product.image" width="50"></td>
      <td>{{ product.description }}</td>
      <td>{{ product.category }}</td>
      <td>
        <button (click)="openEditProductForm(product)">Editar</button>
        <button (click)="confirmDelete(product)">Eliminar</button>
      </td>
    </tr>
  </tbody>
</table>

<app-product-confirm-dialog 
  *ngIf="showConfirmDialog"
  [message]="'¿Eliminar ' + selectedProduct?.name + '?'"
  (confirm)="deleteProduct($event)">
</app-product-confirm-dialog>

<app-product-form-dialog 
  *ngIf="showFormDialog"
  [product]="selectedProduct!"
  (save)="saveProduct($event)"
  (cancel)="cancelForm()">
</app-product-form-dialog>
