<div class="main-layout">
  
  <!-- BARRA LATERAL IZQUIERDA -->
  <aside class="sidebar">
    <h3>Categorías</h3>
    <button mat-button (click)="filterByCategory('Todos')" [class.active-category]="selectedCategory === 'Todos'">📦 Todos</button>
    <button mat-button (click)="filterByCategory('Harinas')" [class.active-category]="selectedCategory === 'Harinas'">🌾 Harinas</button>
    <button mat-button (click)="filterByCategory('Cereales')" [class.active-category]="selectedCategory === 'Cereales'">🥣 Cereales</button>
    <button mat-button (click)="filterByCategory('Snacks')" [class.active-category]="selectedCategory === 'Snacks'">🍪 Snacks</button>
    <button mat-button (click)="filterByCategory('Detergentes')" [class.active-category]="selectedCategory === 'Detergentes'">🍯 Detergente</button>
    <button mat-button (click)="filterByCategory('Bebidas')" [class.active-category]="selectedCategory === 'Bebidas'">🥤 Bebidas</button>
    <button mat-button (click)="filterByCategory('Frutas')" [class.active-category]="selectedCategory === 'Frutas'">💪 Frutas</button>
  </aside>

  <!-- CONTENIDO DERECHO (TIENDA) -->
  <div class="store-container">
    
    <!-- BARRA SUPERIOR -->
    <div class="store-header">
      <span class="header-title">Tienda de Don Pepe</span>
      <span class="spacer"></span>
      <button mat-icon-button color="accent" [matBadge]="cartCount" matBadgeColor="warn" aria-label="Carrito de compras">
        <mat-icon>shopping_cart</mat-icon>
      </button>
    </div>

    <!-- PRODUCTOS -->
    <div class="product-grid">
      <mat-card class="product-card" *ngFor="let product of filteredProducts">
        <img mat-card-image [src]="product.image" [alt]="product.name">
        <mat-card-title>{{ product.name }}</mat-card-title>
        <mat-card-subtitle>{{ product.description }}</mat-card-subtitle>
        <mat-card-content>
          <span class="price">S/ {{ product.price | number:'1.2-2' }}</span>
        </mat-card-content>
        <mat-card-actions align="end">
          <button mat-raised-button color="primary" (click)="addToCart(product)">
            <mat-icon>add_shopping_cart</mat-icon> Agregar
          </button>
        </mat-card-actions>
      </mat-card>
    </div>
  </div>

</div>
