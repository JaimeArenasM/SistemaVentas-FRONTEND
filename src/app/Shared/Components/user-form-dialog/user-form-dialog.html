<div class="dialog-header">
  <h2 mat-dialog-title>{{ esEdicion ? 'Editar Usuario' : 'Nuevo Usuario' }}</h2>
  <button mat-icon-button (click)="onCancel()" class="close-btn"><mat-icon>close</mat-icon></button>
</div>

<mat-dialog-content class="dialog-content">
  <form [formGroup]="userForm" class="crm-form">

    <div class="form-row">
      <div class="form-group">
        <label>Nombres</label>
        <input type="text" formControlName="nombres" placeholder="Ej. Juan">
      </div>
      <div class="form-group">
        <label>Apellidos</label>
        <input type="text" formControlName="apellidos" placeholder="Ej. Pérez">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>DNI</label>
        <input type="text" formControlName="dni" placeholder="Número de documento">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" formControlName="telefono" placeholder="Celular">
      </div>
    </div>

    <div class="form-group">
      <label>Correo Electrónico (Usuario)</label>
      <input type="email" formControlName="vUsuario" placeholder="ejemplo@correo.com">
    </div>

    <div class="form-group">
      <label>Rol del Sistema</label>
      <select formControlName="iIdTipoUsuario">
        <option [ngValue]="2">Cliente</option>
        <option [ngValue]="1">Administrador</option>
      </select>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button (click)="onCancel()" class="btn-cancel">Cancelar</button>
  <button mat-raised-button (click)="onSave()" class="btn-save" [disabled]="!userForm.valid">
    {{ esEdicion ? 'Guardar Cambios' : 'Crear Usuario' }}
  </button>
</mat-dialog-actions>
