<h2 mat-dialog-title class="crm-dialog-title">{{ data.title }}</h2>
<mat-dialog-content class="crm-dialog-content">
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end" class="crm-dialog-actions">
  <button mat-button (click)="onCancel()" class="btn-cancel">Cancelar</button>

  <button mat-raised-button (click)="onConfirm()" class="btn-confirm">
    {{ data.confirmText }}
  </button>
</mat-dialog-actions>
